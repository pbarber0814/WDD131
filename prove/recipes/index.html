<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Preston Barber">
    <meta name="description" content="Recipe Book.">
    <title>Recipe Book</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Simple and delicious recipes for everyone.">
    <meta property="og:url" content="https://example.com">
    <meta property="og:image" content="social-preview-image.png">
    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="Simple and delicious recipes for everyone.">
    <meta name="twitter:image" content="social-preview-image.png">
    <!-- Favicons -->
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

</head>

<body>

    <header class="site-header">

        <div class="logo">
            <img src="images/recipe-book.png" alt="Recipe Book Logo">
            <h1>RecipeBook</h1>
        </div>

    </header>


    <main>

        <!-- Search Bar -->

        <div class="search">

            <input type="text" placeholder="Find a recipe">

            <button>
                <img src="images/search.svg" alt="search">
            </button>

        </div>


        <!-- Recipe Card -->

        <section class="recipe">

            <img src="images/apple-crisp.jpg" alt="Apple Crisp">

            <div class="recipe-info">

                <span class="tag">dessert</span>

                <h2>Apple Crisp</h2>

                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">⭐</span>
                    <span aria-hidden="true">☆</span>
                </span>

                <p class="description">
                    This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla
                    ice cream.
                </p>

            </div>

        </section>

    </main>


    <footer>

        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
            Recipe icons created by Freepik - Flaticon
        </a>

        <div class="social">

            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->

            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>

        </div>

    </footer>

</body>

</html>
