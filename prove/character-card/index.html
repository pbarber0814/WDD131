<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A dynamic character card built with JavaScript objects demonstrating methods and state updates.">
  <title>Character Card</title>
  <meta name="author" content="Preston Barber">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Character Card">
  <meta property="og:description" content="A dynamic character card built with JavaScript objects demonstrating methods and state updates.">
  <meta property="og:url" content="https://pbarber0814.github.io/WDD131/prove/character-card/">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="character_card.css">
  <script src="character_card.js" defer></script>
</head>

<body>

  <div class="card">
    <img 
      id="characterImage" 
      class="image" 
      alt="Character image"
      width="300"
      height="300"
    >

    <div id="characterName" class="name"></div>

    <div class="stats">
      <p id="characterClass"></p>
      <p id="characterLevel"></p>
      <p id="characterHealth"></p>
    </div>

    <div class="buttons">
      <button id="attackBtn">Attacked</button>
      <button id="levelUpBtn">Level Up</button>
    </div>
  </div>

</body>
</html>
