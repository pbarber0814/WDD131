<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Preston Barber">
    <title>Games | Gaming Almanac</title>
    <meta name="description" content="Gaming Almanac - Games Page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/script.js" defer></script>
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Gaming Almanac Logo" class="logo">
        <h1>Gaming Almanac</h1>
        <nav aria-label="Main Navigation">
            <a href="index.html">Home</a>
            <a href="games.html">Games</a>
        </nav>
    </header>

    <main>
        <h2>Favorite Games</h2>

        <section id="game-card">
            <img id="game-image" src="images/placeholder.jpg" alt="Game Image">
            <h3 id="game-title">Game Title</h3>
            <p id="game-description">
                Game description will appear here.
            </p>

            <div class="buttons">
                <button type="button" id="prev-btn" aria-label="Show previous game">Previous</button>
                <button ype="button" id="next-btn" aria-label="Show next game">Next</button>
            </div>

            <button id="gallery-btn" aria-label="Open image gallery for this game">View Gallery</button>
        </section>

    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" aria-label="Close gallery" role="button">&times;</span>
            <h3>Game Gallery</h3>
            <div id="gallery-container">
            </div>
        </div>
    </div>

    <div id="image-viewer" class="image-viewer">
        <span id="close-viewer" aria-label="Close full screen image" role="button">&times;</span>
        <img id="viewer-img" src="#" alt="Full Image">
    </div>

    <footer>
        <p>&copy; 2026 Gaming Almanac | Preston Barber</p>
    </footer>

</body>
</html>
